<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application</title>
    <style>
      :root {
        color-scheme: light;
      }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
        background: #fafaf7;
        color: #111;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }
      body {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 48px 24px;
        box-sizing: border-box;
      }
      main {
        width: 100%;
        max-width: 640px;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }
      .line {
        font-size: 22px;
        line-height: 1.4;
        min-height: 1.4em;
        white-space: pre-wrap;
      }
      .caret {
        display: inline-block;
        width: 0.55ch;
        background: #111;
        margin-left: 2px;
        animation: blink 1s steps(1) infinite;
      }
      .caret.hidden { display: none; }
      @keyframes blink {
        50% { background: transparent; }
      }
      .stage {
        opacity: 0;
        transform: translateY(6px);
        transition: opacity 600ms ease, transform 600ms ease;
      }
      .stage.show {
        opacity: 1;
        transform: translateY(0);
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      input[type="file"] {
        font: inherit;
        font-size: 14px;
      }
      button {
        font: inherit;
        font-size: 15px;
        padding: 10px 16px;
        border: 1px solid #111;
        background: #111;
        color: #fafaf7;
        border-radius: 6px;
        cursor: pointer;
        align-self: flex-start;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        font-size: 14px;
        color: #555;
        min-height: 1.2em;
      }
      .status.error { color: #b00020; }
      .status.success { color: #0a7a3b; }
      .submissions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .submissions-header {
        font-size: 14px;
        color: #555;
        text-transform: lowercase;
        letter-spacing: 0.02em;
      }
      .submission {
        padding: 12px 14px;
        border: 1px solid #d4d4d0;
        border-radius: 6px;
        background: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }
      .submission a {
        color: #111;
        text-decoration: underline;
        word-break: break-all;
      }
      .submission .meta {
        font-size: 12px;
        color: #888;
        white-space: nowrap;
      }
      .empty {
        font-size: 14px;
        color: #888;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="line1" class="line"><span class="text"></span><span class="caret"></span></div>
      <div id="line2" class="line"><span class="text"></span><span class="caret hidden"></span></div>

      <div id="stage" class="stage">
        <form id="form" autocomplete="off">
          <input type="file" name="attachment" required />
          <button type="submit" id="submit">submit</button>
          <div id="status" class="status"></div>
        </form>
      </div>

      <div id="listStage" class="stage">
        <div class="submissions">
          <div class="submissions-header">submissions</div>
          <div id="list"></div>
        </div>
      </div>
    </main>

    <script>
      const DB_URL = "https://banagrams-66c81-default-rtdb.firebaseio.com/eurotrip.json";

      const line1Text = "welcome gabrielle miri";
      const line2Text = "please submit the application here";

      const line1El = document.querySelector("#line1 .text");
      const line1Caret = document.querySelector("#line1 .caret");
      const line2El = document.querySelector("#line2 .text");
      const line2Caret = document.querySelector("#line2 .caret");
      const stage = document.getElementById("stage");
      const listStage = document.getElementById("listStage");
      const listEl = document.getElementById("list");

      function type(el, text, speed) {
        return new Promise((resolve) => {
          let i = 0;
          const tick = () => {
            if (i <= text.length) {
              el.textContent = text.slice(0, i);
              i += 1;
              setTimeout(tick, speed);
            } else {
              resolve();
            }
          };
          tick();
        });
      }

      function delay(ms) {
        return new Promise((r) => setTimeout(r, ms));
      }

      function formatDate(ts) {
        const d = new Date(ts);
        return d.toLocaleString(undefined, {
          year: "numeric",
          month: "short",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        }).toLowerCase();
      }

      function renderSubmissions(submissions) {
        if (!submissions.length) {
          listEl.innerHTML = '<div class="empty">no submissions yet</div>';
          return;
        }
        listEl.innerHTML = "";
        for (const s of submissions) {
          const row = document.createElement("div");
          row.className = "submission";
          const left = document.createElement("div");
          const link = document.createElement("a");
          link.href = s.url;
          link.target = "_blank";
          link.rel = "noopener";
          link.textContent = s.filename || s.url;
          left.appendChild(link);
          const meta = document.createElement("div");
          meta.className = "meta";
          meta.textContent = formatDate(s.timestamp);
          row.appendChild(left);
          row.appendChild(meta);
          listEl.appendChild(row);
        }
      }

      async function loadSubmissions() {
        try {
          const res = await fetch(DB_URL);
          const data = await res.json();
          const arr = data
            ? Object.values(data).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
            : [];
          renderSubmissions(arr);
        } catch (err) {
          console.error(err);
          listEl.innerHTML = '<div class="empty">could not load submissions</div>';
        }
      }

      async function run() {
        await delay(400);
        await type(line1El, line1Text, 110);
        await delay(700);
        line1Caret.classList.add("hidden");
        line2Caret.classList.remove("hidden");
        await type(line2El, line2Text, 55);
        await delay(400);
        stage.classList.add("show");
        await delay(200);
        listStage.classList.add("show");
        loadSubmissions();
      }

      run();

      const form = document.getElementById("form");
      const status = document.getElementById("status");
      const submit = document.getElementById("submit");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        submit.disabled = true;
        status.className = "status";

        const fileInput = form.querySelector('input[type="file"]');
        const file = fileInput.files[0];
        if (!file) {
          submit.disabled = false;
          return;
        }

        status.textContent = "uploading...";

        let fileUrl;
        try {
          const fileData = new FormData();
          fileData.append("reqtype", "fileupload");
          fileData.append("fileToUpload", file);
          const fileRes = await fetch("https://catbox.moe/user/api.php", {
            method: "POST",
            body: fileData,
          });
          const text = (await fileRes.text()).trim();
          if (!fileRes.ok || !text.startsWith("http")) {
            throw new Error("upload failed: " + text);
          }
          fileUrl = text;
        } catch (err) {
          console.error(err);
          status.textContent = "file upload failed. please try again.";
          status.className = "status error";
          submit.disabled = false;
          return;
        }

        status.textContent = "saving...";

        try {
          const res = await fetch(DB_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              filename: file.name,
              url: fileUrl,
              timestamp: Date.now(),
            }),
          });
          if (!res.ok) {
            throw new Error("save failed: " + res.status);
          }
          status.textContent = "submitted.";
          status.className = "status success";
          form.reset();
          submit.disabled = false;
          loadSubmissions();
        } catch (err) {
          console.error(err);
          status.textContent = "save failed. please try again.";
          status.className = "status error";
          submit.disabled = false;
        }
      });
    </script>
  </body>
</html>
